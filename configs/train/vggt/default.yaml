# @package _global_

defaults:
  - /_base_/default_log.yaml
  - /_base_/default_dataset.yaml
  - /_base_/default_runtime.yaml
  - _self_

max_epochs: 161
seed_value: 42
accum_steps: 1    # We did not use gradient accumulation in our training, while if you suffer from OOM, you can try to use it.
val_epoch_freq: 10
lr: 1e-4
log_dir: output/vggt/train/base
mode: train
enable_point_in_ego_n: False
enable_point_in_ego_first: True
enable_cam: True
gt_scale_factor: 1.0

# Fine-tuning VGGT: Using absolute metric scale; alignment disabled.
eval_conf:
  use_umeyama_per_scene: False

data_conf:
  train:
    common_dataset_config:
      enable_cam: ${enable_cam}
      patch_size: 14
      image_width: 518
  val:
    common_dataset_config:
      enable_cam: ${enable_cam}
      patch_size: 14
      image_width: 518

logging_conf:
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_camera_T
        - loss_camera_R
        - loss_camera_FL
        - loss_cam_first_conf_point
        - loss_cam_first_reg_point
        - loss_cam_first_grad_point
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_camera_T
        - loss_camera_R
        - loss_camera_FL
        - loss_cam_first_conf_point
        - loss_cam_first_reg_point
        - loss_cam_first_grad_point

checkpoint:
  save_dir: ${log_dir}/ckpts
  save_freq: 5
  direct_load_pretrained_weights_path: ckpt/VGGT-1B/model.safetensors
  strict: False

loss:
  _target_: dvgt.models.losses.loss.MultitaskLoss
  loss_config:
    - _target_: dvgt.models.losses.point_in_cam_first.PointInCamFirstLoss
      weight: 1.0
      reg_loss_type: "l2"
      valid_range: 0.98
      alpha: 2
    - _target_: dvgt.models.losses.cam_pose.CamPoseLoss
      weight: 5.0
      loss_type: "l1"

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: ${lr}
    weight_decay: 0.05

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: dvgt.utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["point"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: ${lr}
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: ${lr}
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

model:
  _target_: third_party.vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: False
  enable_point: True
  enable_track: False