# @package _global_

defaults:
  - /_base_/default_log.yaml
  - /_base_/default_dataset.yaml
  - /_base_/default_runtime.yaml
  - _self_

max_epochs: 161
seed_value: 42
accum_steps: 1    # We did not use gradient accumulation in our training, while if you suffer from OOM, you can try to use it.
val_epoch_freq: 10
lr: 1e-4
log_dir: output/dvgt1/train/base
mode: train

eval_conf:
  gt_scale_factor: ${gt_scale_factor}

checkpoint:
  save_dir: ${log_dir}/ckpts
  save_freq: 5
  load_pretrained_weights_path: ckpt/VGGT-1B/model.safetensors
  strict: False

loss:
  _target_: dvgt.models.losses.loss.MultitaskLoss
  loss_config:
    - _target_: dvgt.models.losses.point_in_ego_first.PointInEgoFirstLoss
      weight: 1.0
      reg_loss_type: "l2"
      valid_range: 0.98
      alpha: 0.2
    - _target_: dvgt.models.losses.absolute_ego_pose.AbsoluteEgoPoseLoss
      weight: 5.0
      T_loss_type: "l1"
      R_loss_type: 'l1'

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: ${lr}
    weight_decay: 0.05

  # frozen_module_names:
  #     - "*aggregator*"  # example, freeze the aggregator

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: dvgt.utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["ego_pose"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["point"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: ${lr}
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: ${lr}
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

model:
  _target_: dvgt.models.architectures.dvgt1.DVGT1
  dino_v3_weight_path: ckpt/dinov3/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth