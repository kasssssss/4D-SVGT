# @package _global_

defaults:
  - /_base_/default_log.yaml
  - /_base_/default_dataset.yaml
  - /_base_/default_runtime.yaml
  - _self_

max_epochs: 161
seed_value: 42
accum_steps: 1    # We did not use gradient accumulation in our training, while if you suffer from OOM, you can try to use it.
val_epoch_freq: 10
lr: 1e-4
log_dir: output/dvgt2/train/default_mlp_head
mode: train
enable_point_in_ego_n: True
enable_point_in_ego_first: False
enable_past_ego: True
future_frame_num: 8
relative_pose_window: 1
enable_ego_status: False

eval_conf:
  gt_scale_factor: ${gt_scale_factor}

checkpoint:
  save_dir: ${log_dir}/ckpts
  save_freq: 5
  load_pretrained_weights_path_dvgt: ckpt/dvgt2_stage_1_pretrain.pt
  strict: False

data_conf:
  val:
    common_dataset_config:
      clip_split_type: DVGT2
      fixed_num_frames: 4   # 4-frame window for validation; 8-frame rollout for inference.

loss:
  _target_: dvgt.models.losses.loss.MultitaskLoss
  loss_config:
    - _target_: dvgt.models.losses.point_in_ego_n.PointInEgoNLoss
      weight: 1.0
      reg_loss_type: "l2"
      valid_range: 0.98
      alpha: 0.2
    - _target_: dvgt.models.losses.trajectory.TrajectoryLoss
      xy_weight: 5.0
      theta_weight: 5.0
      gt_scale_factor: ${gt_scale_factor}
    - _target_: dvgt.models.losses.relative_ego_pose.RelativeEgoPoseLoss
      weight: 5.0
      T_loss_type: "l1"
      R_loss_type: 'l1'

logging_conf:
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_ego_n_conf_point
        - loss_ego_n_reg_point
        - loss_ego_n_grad_point
        - traj_reg_loss
        - traj_theta_loss
        - loss_relative_ego_pose_T
        - loss_relative_ego_pose_R
    val:
      keys_to_log:
        - loss_objective
        - loss_ego_n_conf_point
        - loss_ego_n_reg_point
        - loss_ego_n_grad_point
        - traj_reg_loss
        - traj_theta_loss
        - loss_relative_ego_pose_T
        - loss_relative_ego_pose_R

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: ${lr}
    weight_decay: 0.05

  # frozen_module_names:
  #     - "*aggregator*"  # example, freeze the aggregator

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: dvgt.utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["ego_pose"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["point"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: ${lr}
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: ${lr}
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

model:
  _target_: dvgt.models.architectures.dvgt2.DVGT2
  dino_v3_weight_path: ckpt/dinov3/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth
  use_causal_mask: True
  future_frame_window: ${future_frame_num}
  relative_pose_window: ${relative_pose_window}
  ego_pose_head_conf:
    _target_: dvgt.models.heads.dvgt2_ego_pose_head_mlp.DVGT2EgoPoseHeadMLP
    enable_ego_status: ${enable_ego_status}