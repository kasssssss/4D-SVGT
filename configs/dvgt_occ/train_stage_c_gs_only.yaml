data:
  manifest: data/nuscenes_dvgt_v0/manifest_trainval.json
  output_root: data/nuscenes_dvgt_v0
  require_supervision_frozen: true
  supervision_ready_files:
    - data/nuscenes_dvgt_v0/logs/dev_backfill_full_20260419/sam3_backfill_full.status
    - data/nuscenes_dvgt_v0/logs/dev_backfill_full_20260419/postprocess_after_backfill.status
    - data/nuscenes_dvgt_v0/logs/dev_backfill_full_20260419/audit_after_backfill.json
    - data/nuscenes_dvgt_v0/qc/sam3_mask_consistency_backfill_full/summary.json
  train_scene_ids: ["000", "001", "002", "003", "005", "006", "007", "008"]
  val_scene_ids: ["004", "009"]
  train_limit: null
  val_limit: null
  val_dynamic_only: true
  val_min_dynamic_pixels: 256
  dynamic_val_scene_ids: ["004", "009"]
  dynamic_val_limit: null
  dynamic_val_only: true
  dynamic_val_min_dynamic_pixels: 1024

model:
  num_frames: 8
  num_views: 6
  image_height: 224
  image_width: 448
  selected_layers: [4, 11, 17, 23]
  dynamic_query_dim: 256
  instance_dim: 32
  motion_dim: 16
  dynamic_classes: 8
  semantic_classes: 18
  projected_semantic_classes: 9
  max_track_queries: 64
  new_queries: 64
  sparse_dynamic_anchors: 2048
  gs_bias_scale: 1.25
  render_splat_radius: 4

train:
  seed: 42
  batch_size: 1
  num_workers: 0
  max_steps: 5000
  log_interval: 10
  save_interval: 100
  val_interval: 100
  val_batches: 16
  dynamic_val_batches: 16
  amp: true
  gradient_checkpointing: true
  grad_clip: 1.0
  train_target: gs_only
  train_mode: v1-stable
  warmup_iters: 1500
  min_lr: 1.0e-6
  bridge_start_step: 1000000
  stability_start_step: 1000000
  allow_tf32: true
  log_dir: data/nuscenes_dvgt_v0/logs/train_stage_c_gs_only_v1
  visualize_every_epochs: 25
  visualize_frame_index: 0
  visualize_view_index: 0
  visualize_sample_index: 0
  visualize_max_scene_points: 20000

ddp:
  backend: nccl
  timeout_sec: 1800
  find_unused_parameters: false
  broadcast_buffers: false
  static_graph: false

optimizer:
  base_lr: 1.0e-4
  gs_lr: 1.0e-4
  bridge_lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 1.0e-4

loss_weights:
  base:
    dyn_soft: 0.0
    presence: 0.0
    query_match: 0.0
    query_cls: 0.0
    query_box3d: 0.0
    track_mem_feat: 0.0
    track_mem_box: 0.0
    birth_death: 0.0
    occ: 0.0
    sem_occ: 0.0
    dyn_occ: 0.0
    gs_render: 1.0
    inst_contrast: 0.0
    query2gs: 0.0
    q2gs_null: 0.0
    mask_render: 0.0
    occ_local2gs: 0.0
    gs2occ_local: 0.0
    sem_proj_2d: 0.0
    motion_cons: 0.0
    gs_sparse: 0.0
  bridge_warmup:
    occ_local2gs: 0.0
    gs2occ_local: 0.0
    sem_proj_2d: 0.0
    motion_cons: 0.0
    gs_sparse: 0.0
  after_stability:
    occ_local2gs: 0.0
    gs2occ_local: 0.0
    sem_proj_2d: 0.0
    motion_cons: 0.0
    gs_sparse: 0.0
