# @package _global_

# This version is fine-tuned from NavTrain, now incorporating 
# ego-vehicle status (e.g., velocity, acc, driving command) as an auxiliary input.

defaults:
  - /train/dvgt2/default_finetune_navtrain.yaml
  - _self_

log_dir: output/dvgt2/eval/closed_loop/default_finetune_navtrain
checkpoint_path: ckpt/dvgt2.pt

data_conf:
  val:
    common_dataset_config:
      clip_split_type: navtest
    dataset_config:
      - parquet_path: data_annotation/meta/moge_v2_large_correct_focal/moge_pred_filter_parquet/openscene_navtest.parquet
        original_fps: 2
        fixed_aspect_ratio: 1.77

model_wrapper_conf:
  _target_: dvgt.evaluation.models.dvgt2.DVGT2Wrapper
  model_config: ${model}
  eval_config:
    gt_scale_factor: ${gt_scale_factor}
    # Window size for streaming evaluation. Set > 0 to enable; -1 for full-sequence offline inference.
    infer_window: -1    
    eval_point_and_pose: False
    eval_traj: True