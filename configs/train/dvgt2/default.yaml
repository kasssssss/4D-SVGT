# @package _global_

defaults:
  - /_base_/default_log.yaml
  - /_base_/default_dataset.yaml
  - /_base_/default_runtime.yaml
  - _self_

max_epochs: 161
seed_value: 42
accum_steps: 1    # We did not use gradient accumulation in our training, while if you suffer from OOM, you can try to use it.
val_epoch_freq: 10
lr: 1e-4
log_dir: output/dvgt2/train/default
mode: train
enable_point_in_ego_n: True
enable_point_in_ego_first: False
enable_past_ego: True
future_frame_num: 8
relative_pose_window: 1
traj_anchor_filepath: data_annotation/anchors/train_total_20/future_anchors_20_rdf.npz
pose_translation_anchor_filepath: data_annotation/anchors/train_total_20/past_anchors_20_rdf.npz
enable_ego_status: False

eval_conf:
  gt_scale_factor: ${gt_scale_factor}

data_conf:
  val:
    common_dataset_config:
      clip_split_type: DVGT2
      fixed_num_frames: 4   # 4-frame window for validation; 8-frame rollout for inference.
    dataset_config:
      - parquet_path: data_annotation/meta/moge_v2_large_correct_focal/moge_pred_filter_parquet/kitti_val.parquet
        original_fps: 10
        fixed_aspect_ratio: 3.3

checkpoint:
  save_dir: ${log_dir}/ckpts
  save_freq: 5
  # load_pretrained_weights_path_dvgt: ckpt/dvgt2_stage_1_pretrain.pt
  resume_checkpoint_path: output/dvgt2/train/default/ckpts/checkpoint.pt
  strict: False

loss:
  _target_: dvgt.models.losses.loss.MultitaskLoss
  loss_config:
    - _target_: dvgt.models.losses.point_in_ego_n.PointInEgoNLoss
      weight: 1.0
      reg_loss_type: "l2"
      valid_range: 0.98
      alpha: 0.2
    - _target_: dvgt.models.losses.diffusion_past_pose.DiffusionPastPoseLoss
      cls_loss_weight: 5.0
      reg_loss_weight: 5.0
      anchor_filepath: ${pose_translation_anchor_filepath}
      gt_scale_factor: ${gt_scale_factor}
    - _target_: dvgt.models.losses.diffusion_trajectory.DiffusionTrajectoryLoss
      cls_loss_weight: 5.0
      reg_loss_weight: 5.0
      anchor_filepath: ${traj_anchor_filepath}
      gt_scale_factor: ${gt_scale_factor}

logging_conf:
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_ego_n_conf_point
        - loss_ego_n_reg_point
        - loss_ego_n_grad_point
        - relative_pose_reg_loss_0
        - relative_pose_reg_loss_1
        - relative_pose_cls_loss_0
        - relative_pose_cls_loss_1
        - traj_reg_loss_0
        - traj_reg_loss_1
        - traj_cls_loss_0
        - traj_cls_loss_1
    val:
      keys_to_log:
        - loss_objective
        - loss_ego_n_conf_point
        - loss_ego_n_reg_point
        - loss_ego_n_grad_point
        - relative_pose_reg_loss_0
        - relative_pose_reg_loss_1
        - relative_pose_cls_loss_0
        - relative_pose_cls_loss_1
        - traj_reg_loss_0
        - traj_reg_loss_1
        - traj_cls_loss_0
        - traj_cls_loss_1

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: ${lr}
    weight_decay: 0.05

  # frozen_module_names:
  #     - "*aggregator*"  # example, freeze the aggregator

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: dvgt.utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["ego_pose"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["point"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: ${lr}
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: ${lr}
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

model:
  _target_: dvgt.models.architectures.dvgt2.DVGT2
  dino_v3_weight_path: ckpt/dinov3/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth
  use_causal_mask: True
  future_frame_window: ${future_frame_num}
  relative_pose_window: ${relative_pose_window}
  ego_pose_head_conf:
    _target_: dvgt.models.heads.dvgt2_ego_pose_head.DVGT2EgoPoseHead
    future_frame_window: ${future_frame_num}
    relative_pose_window: ${relative_pose_window}
    traj_anchor_filepath: ${traj_anchor_filepath}
    pose_translation_anchor_filepath: ${pose_translation_anchor_filepath}
    gt_scale_factor: ${gt_scale_factor}
    enable_ego_status: ${enable_ego_status}